<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Neighborhood Index — New York</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css?v=4" />
  </head>
  <body>
    <aside id="sidebar">
      <div class="masthead">
        <div class="issue">No. 01 &nbsp;·&nbsp; New York</div>
        <h1>The Neighborhood <em>Index.</em></h1>
        <p class="dek">
          Five measures of city life — safety, food inspections, 311,
          rent, and a composite newcomer score — drawn from public
          records and aggregated to 262 neighborhoods.
        </p>
        <a href="dashboard.html" class="cta-link">Read the analytics &rarr;</a>
      </div>

      <div class="section">
        <span class="section-label">Colour the map by</span>
        <div class="metric-pills" id="metric-pills">
          <button data-metric="score" class="active">Newcomer score</button>
          <button data-metric="crime">Crime</button>
          <button data-metric="food">Food safety</button>
          <button data-metric="311">311</button>
          <button data-metric="rent">Rent (ZORI)</button>
        </div>
      </div>

      <div id="legend" class="legend"></div>

      <div id="detail" class="detail-panel">
        <div class="empty">Select a neighborhood to open its profile.</div>
      </div>

      <div class="footer">
        <span class="status-dot loading" id="status-dot"></span>
        <span id="status">Loading…</span>
      </div>
    </aside>
    <main id="map"></main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="map.js?v=5"></script>
  </body>
</html>
