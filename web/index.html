<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NYC Neighborhood Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css?v=2" />
  </head>
  <body>
    <aside id="sidebar">
      <div class="header">
        <div class="brand">
          <span class="dot"></span>
          <span>NYC Insights</span>
        </div>
        <h1>Find your neighborhood</h1>
        <p class="sub">Crime, food safety, 311 complaints and rent — aggregated to 262 NYC neighborhoods.</p>
        <a href="dashboard.html" class="dashboard-cta">
          <span>Open analytics dashboard</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </a>
      </div>

      <div class="section">
        <span class="section-label">Metric</span>
        <div class="metric-pills" id="metric-pills">
          <button data-metric="score" class="active">Newcomer Score</button>
          <button data-metric="crime">Crime</button>
          <button data-metric="food">Food Safety</button>
          <button data-metric="311">Recent 311</button>
          <button data-metric="rent">Rent (ZORI)</button>
        </div>
      </div>

      <div id="legend" class="legend"></div>

      <div id="detail" class="detail-panel">
        <div class="empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <p>Click a neighborhood on the map to see its full profile.</p>
        </div>
      </div>

      <div class="footer">
        <span class="status-dot loading" id="status-dot"></span>
        <span id="status">Loading…</span>
      </div>
    </aside>
    <main id="map"></main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="map.js?v=2"></script>
  </body>
</html>
